version: "3.9"
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: chatbot_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 29344
      POSTGRES_DB: ai4governance
    ports:
      - "5433:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql